name: Release VS Code Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npx --yes @vscode/vsce package --no-yarn --no-git-tag-version "$VERSION" -o "sheikah-${VERSION}.vsix"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="$PREV_TAG..HEAD"
          fi

          CHANGELOG=$(git log $RANGE --pretty=format:"- %s" --no-merges)

          NOTES="## Install\n\`\`\`bash\ncode --install-extension sheikah-${VERSION}.vsix\n\`\`\`\n\n## Changes\n${CHANGELOG}"

          gh release create "$GITHUB_REF_NAME" \
            "sheikah-${VERSION}.vsix" \
            --title "Sheikah ${VERSION}" \
            --notes "$NOTES"