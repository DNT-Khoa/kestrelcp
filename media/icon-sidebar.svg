<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Isometric Rubik cube -->
  <g transform="translate(12,12) scale(1.15) translate(-12,-12)">

  <!-- Top face -->
  <polygon points="12.00,3.00 19.79,7.50 12.00,12.00 4.21,7.50" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
  <!-- Left face -->
  <polygon points="4.21,7.50 12.00,12.00 12.00,21.00 4.21,16.50" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
  <!-- Right face -->
  <polygon points="19.79,7.50 12.00,12.00 12.00,21.00 19.79,16.50" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>

  <!-- Top face grid -->
  <line x1="9.40" y1="4.50" x2="17.20" y2="9.00" stroke="currentColor" stroke-width="0.7"/>
  <line x1="6.80" y1="6.00" x2="14.60" y2="10.50" stroke="currentColor" stroke-width="0.7"/>
  <line x1="14.60" y1="4.50" x2="6.80" y2="9.00" stroke="currentColor" stroke-width="0.7"/>
  <line x1="17.20" y1="6.00" x2="9.40" y2="10.50" stroke="currentColor" stroke-width="0.7"/>

  <!-- Left face grid -->
  <line x1="4.21" y1="10.50" x2="12.00" y2="15.00" stroke="currentColor" stroke-width="0.7"/>
  <line x1="4.21" y1="13.50" x2="12.00" y2="18.00" stroke="currentColor" stroke-width="0.7"/>
  <line x1="6.80" y1="9.00" x2="6.80" y2="18.00" stroke="currentColor" stroke-width="0.7"/>
  <line x1="9.40" y1="10.50" x2="9.40" y2="19.50" stroke="currentColor" stroke-width="0.7"/>

  <!-- Right face grid -->
  <line x1="19.79" y1="10.50" x2="12.00" y2="15.00" stroke="currentColor" stroke-width="0.7"/>
  <line x1="19.79" y1="13.50" x2="12.00" y2="18.00" stroke="currentColor" stroke-width="0.7"/>
  <line x1="17.20" y1="9.00" x2="17.20" y2="18.00" stroke="currentColor" stroke-width="0.7"/>
  <line x1="14.60" y1="10.50" x2="14.60" y2="19.50" stroke="currentColor" stroke-width="0.7"/>
  </g>
</svg>
