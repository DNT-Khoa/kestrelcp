<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!--
    Sheikah Eye — monochrome silhouette for VS Code activity bar.
    VS Code renders this as a mask: filled areas become the icon color,
    transparent areas show the background.
  -->

  <!-- Outer ring -->
  <path d="M 12,1 A 11,11 0 1,1 11.99,1 Z" fill="none" stroke="currentColor" stroke-width="1.3"/>

  <!-- Crown: three triangles -->
  <polygon points="7.2,4.5 8.6,7.8 5.8,7.8" fill="currentColor"/>
  <polygon points="12,3.2 13.4,7.8 10.6,7.8" fill="currentColor"/>
  <polygon points="16.8,4.5 18.2,7.8 15.4,7.8" fill="currentColor"/>

  <!-- Eye (almond shape with hollow iris) -->
  <path fill-rule="evenodd" fill="currentColor" d="
    M 4,12.8 C 6.5,9.8 17.5,9.8 20,12.8 C 17.5,15.8 6.5,15.8 4,12.8 Z
    M 12,10.8 A 2,2 0 1,0 12,14.8 A 2,2 0 1,0 12,10.8 Z
  "/>

  <!-- Teardrop -->
  <path d="M 12,16 C 10.6,18.2 10.6,20.5 12,21.5 C 13.4,20.5 13.4,18.2 12,16 Z" fill="currentColor"/>
</svg>
