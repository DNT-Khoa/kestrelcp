<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFCB6B"/>
      <stop offset="0.5" stop-color="#E5704A"/>
      <stop offset="1" stop-color="#C8541F"/>
    </linearGradient>
    <radialGradient id="blue" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#A5F3FF"/>
      <stop offset="0.6" stop-color="#5BC8FF"/>
      <stop offset="1" stop-color="#0077B6"/>
    </radialGradient>
    <filter id="amberGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="blueGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <g filter="url(#amberGlow)" opacity="0.9">
    <circle cx="128" cy="135" r="108" fill="none" stroke="url(#amber)" stroke-width="2.5"/>
  </g>

  <g filter="url(#amberGlow)">
    <g fill="url(#amber)">
      <path d="M 78 50 L 90 92 L 66 92 Z"/>
      <path d="M 128 38 L 140 92 L 116 92 Z"/>
      <path d="M 178 50 L 190 92 L 166 92 Z"/>

      <path d="M 36 146
               C 60 108, 196 108, 220 146
               C 196 184, 60 184, 36 146 Z"/>

      <path d="M 128 178
               C 110 198, 108 226, 128 232
               C 148 226, 146 198, 128 178 Z"/>
    </g>
  </g>

  <g filter="url(#blueGlow)">
    <circle cx="128" cy="146" r="22" fill="url(#blue)"/>
    <circle cx="128" cy="146" r="7" fill="#0F172A"/>
    <circle cx="121" cy="140" r="3.5" fill="#FFFFFF" opacity="0.85"/>
  </g>
</svg>
